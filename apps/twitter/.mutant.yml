includes:
  - test
requires:
  - ./config/environment
integration: minitest
usage: opensource
coverage_criteria:
  timeout: true
  process_abort: true
matcher:
  subjects:
    - PublicFeed*
    - Accounts*
    - Follows*
    - HomeTimeline*
  ignore:
    - PublicFeed::Configuration#call
    - Accounts::Configuration#call
    - Follows::Configuration#call
    - HomeTimeline::Configuration#call
